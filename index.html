<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Постер из листов для доски</title>
  <style>
    :root {
      --bg: #f5f6f3;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --line: #d6deea;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #dff7f2 0%, transparent 30%),
        radial-gradient(circle at 85% 80%, #ffe8ce 0%, transparent 32%),
        var(--bg);
    }
    .wrap { max-width: 1160px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--card);
      border: 1px solid #e5ebf3;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 8px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .muted { margin: 0; color: var(--muted); }
    .grid { display: grid; gap: 10px; }
    .fields { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    input, select {
      width: 100%; border: 1px solid #cdd7e5; border-radius: 10px; padding: 9px 10px; font-size: 14px;
      background: #fff;
    }
    .result strong { color: var(--accent); font-size: 24px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    .wallWrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: #fafafa; }
    .wall {
      position: relative;
      margin: 0 auto;
      border: 2px solid #aab9ca;
      border-radius: 8px;
      background: linear-gradient(140deg, #f8fafc, #eef2f7);
      min-width: 320px;
      min-height: 180px;
    }
    .poster {
      position: absolute;
      border: 1px dashed #9db4cf;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,.6);
      box-shadow: 0 2px 8px rgba(15,23,42,.08);
    }
    .tiles {
      position: absolute;
      inset: 0;
      display: grid;
      gap: 2px;
      pointer-events: none;
    }
    .tile {
      border: 1px solid rgba(148, 163, 184, .45);
      border-radius: 3px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(15, 23, 42, .75);
      text-shadow: 0 1px 0 rgba(255,255,255,.8);
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #64748b;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Генератор постера из листов</h1>
    <p class="muted">Загрузи изображение, выбери стену, тип листа и целевое число листов. Приложение подберет раскладку и покажет результат на стене.</p>

    <section class="card">
      <h2>1) Параметры</h2>
      <div class="grid fields">
        <div>
          <label>Изображение</label>
          <input id="imageFile" type="file" accept="image/*" />
        </div>
        <div>
          <label>Ширина стены (см)</label>
          <input id="wallW" type="number" value="300" min="50" />
        </div>
        <div>
          <label>Высота стены (см)</label>
          <input id="wallH" type="number" value="120" min="40" />
        </div>
        <div>
          <label>Тип листа</label>
          <select id="sheetType">
            <option value="A4">A4 (210 x 297 мм)</option>
            <option value="A3">A3 (297 x 420 мм)</option>
          </select>
        </div>
        <div>
          <label>Желаемое число листов</label>
          <input id="targetSheets" type="number" value="8" min="1" max="60" />
        </div>
      </div>
    </section>

    <section class="card result">
      <h2>2) Расчет</h2>
      <p>Будет листов: <strong id="sheetCount">0</strong></p>
      <p class="muted" id="stats"></p>
      <div class="actions">
        <button id="printBtn">Печать плиток</button>
        <button id="downloadHtmlBtn" class="secondary">Открыть печатную версию</button>
      </div>
    </section>

    <section class="card">
      <h2>3) Визуализация на стене</h2>
      <div class="wallWrap">
        <div id="wall" class="wall">
          <div id="poster" class="poster">
            <div id="tiles" class="tiles"></div>
            <div id="placeholder" class="placeholder">Загрузи изображение, чтобы увидеть раскладку.</div>
          </div>
        </div>
      </div>
      <p class="muted" id="legend" style="margin-top:8px;"></p>
    </section>
  </div>

  <script>
    const SHEETS = {
      A4: { w: 210, h: 297 },
      A3: { w: 297, h: 420 }
    };

    const state = {
      imageUrl: "",
      imageW: 0,
      imageH: 0
    };

    function getInputs() {
      return {
        wallW: Math.max(50, Number(document.getElementById("wallW").value) || 300),
        wallH: Math.max(40, Number(document.getElementById("wallH").value) || 120),
        targetSheets: Math.max(1, Math.min(60, Number(document.getElementById("targetSheets").value) || 8)),
        sheetType: document.getElementById("sheetType").value
      };
    }

    function bestGrid(target, imgRatio, tileRatio) {
      let best = { cols: 1, rows: 1, sheets: 1, score: Infinity };
      const max = Math.max(60, target + 18);
      for (let cols = 1; cols <= max; cols++) {
        for (let rows = 1; rows <= max; rows++) {
          const sheets = cols * rows;
          if (sheets > 60) continue;
          const posterRatio = (cols * tileRatio) / rows;
          const ratioPenalty = Math.abs(Math.log(posterRatio / imgRatio));
          const countPenalty = Math.abs(sheets - target) / Math.max(1, target);
          const score = ratioPenalty * 2 + countPenalty;
          if (score < best.score) best = { cols, rows, sheets, score };
        }
      }
      return best;
    }

    function compute() {
      const i = getInputs();
      const s = SHEETS[i.sheetType] || SHEETS.A4;
      const wallWmm = i.wallW * 10;
      const wallHmm = i.wallH * 10;
      const margin = 5;
      const overlap = 3;
      const tileW = s.w - margin * 2 - overlap;
      const tileH = s.h - margin * 2 - overlap;
      const tileRatio = tileW / tileH;

      const imgRatio = state.imageW > 0 && state.imageH > 0 ? state.imageW / state.imageH : 16 / 9;
      const grid = bestGrid(i.targetSheets, imgRatio, tileRatio);
      const posterWmm = grid.cols * tileW;
      const posterHmm = grid.rows * tileH;

      const scaleFit = Math.min(wallWmm / posterWmm, wallHmm / posterHmm, 1);
      const finalW = posterWmm * scaleFit;
      const finalH = posterHmm * scaleFit;

      return {
        ...i,
        tileW,
        tileH,
        wallWmm,
        wallHmm,
        imgRatio,
        cols: grid.cols,
        rows: grid.rows,
        sheets: grid.sheets,
        posterWmm: finalW,
        posterHmm: finalH
      };
    }

    function renderTiles(data) {
      const wall = document.getElementById("wall");
      const poster = document.getElementById("poster");
      const tiles = document.getElementById("tiles");
      const placeholder = document.getElementById("placeholder");

      const pxPerMm = Math.min(900 / data.wallWmm, 520 / data.wallHmm);
      const wallPxW = Math.max(320, Math.round(data.wallWmm * pxPerMm));
      const wallPxH = Math.max(180, Math.round(data.wallHmm * pxPerMm));
      wall.style.width = wallPxW + "px";
      wall.style.height = wallPxH + "px";

      const posterPxW = Math.max(100, Math.round(data.posterWmm * pxPerMm));
      const posterPxH = Math.max(70, Math.round(data.posterHmm * pxPerMm));
      poster.style.width = posterPxW + "px";
      poster.style.height = posterPxH + "px";
      poster.style.left = Math.round((wallPxW - posterPxW) / 2) + "px";
      poster.style.top = Math.round((wallPxH - posterPxH) / 2) + "px";

      tiles.style.gridTemplateColumns = `repeat(${data.cols}, 1fr)`;
      tiles.style.gridTemplateRows = `repeat(${data.rows}, 1fr)`;
      tiles.innerHTML = "";

      for (let r = 0; r < data.rows; r++) {
        for (let c = 0; c < data.cols; c++) {
          const idx = r * data.cols + c + 1;
          const tile = document.createElement("div");
          tile.className = "tile";
          tile.textContent = idx;
          if (state.imageUrl) {
            const bgX = (data.cols === 1) ? 50 : (c / (data.cols - 1)) * 100;
            const bgY = (data.rows === 1) ? 50 : (r / (data.rows - 1)) * 100;
            tile.style.backgroundImage = `linear-gradient(rgba(255,255,255,.15), rgba(255,255,255,.15)), url('${state.imageUrl}')`;
            tile.style.backgroundSize = `${data.cols * 100}% ${data.rows * 100}%`;
            tile.style.backgroundPosition = `${bgX}% ${bgY}%`;
          }
          tiles.appendChild(tile);
        }
      }

      placeholder.style.display = state.imageUrl ? "none" : "flex";
    }

    function render() {
      const d = compute();
      document.getElementById("sheetCount").textContent = d.sheets;
      document.getElementById("stats").textContent = `${d.sheetType}: сетка ${d.cols} x ${d.rows}. Размер постера: ${Math.round(d.posterWmm)} x ${Math.round(d.posterHmm)} мм. Полезная зона листа: ${d.tileW.toFixed(1)} x ${d.tileH.toFixed(1)} мм.`;
      document.getElementById("legend").textContent = `Раскладка подбирается близко к ${d.targetSheets} листам с сохранением пропорций изображения.`;
      renderTiles(d);
    }

    function buildPrintHtml(data) {
      const safeImage = state.imageUrl || "";
      let pages = "";
      for (let r = 0; r < data.rows; r++) {
        for (let c = 0; c < data.cols; c++) {
          const idx = r * data.cols + c + 1;
          const bgX = data.cols === 1 ? 50 : (c / (data.cols - 1)) * 100;
          const bgY = data.rows === 1 ? 50 : (r / (data.rows - 1)) * 100;
          pages += `
            <div class="page">
              <div class="tile"
                style="
                  background-image: url('${safeImage}');
                  background-size: ${data.cols * 100}% ${data.rows * 100}%;
                  background-position: ${bgX}% ${bgY}%;
                ">
                <div class="num">${idx}</div>
              </div>
            </div>
          `;
        }
      }

      return `<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Печать плиток</title>
  <style>
    @page { size: A4 portrait; margin: 8mm; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; }
    .page { width: 100%; min-height: calc(100vh - 1px); page-break-after: always; display: flex; align-items: center; justify-content: center; }
    .page:last-child { page-break-after: auto; }
    .tile {
      width: 100%;
      aspect-ratio: 210 / 297;
      border: 1px dashed #999;
      background-repeat: no-repeat;
      position: relative;
    }
    .num {
      position: absolute;
      left: 8px;
      bottom: 8px;
      background: rgba(255,255,255,.85);
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  ${pages}
</body>
</html>`;
    }

    document.getElementById("imageFile").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) {
        state.imageUrl = "";
        state.imageW = 0;
        state.imageH = 0;
        render();
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          state.imageUrl = reader.result;
          state.imageW = img.naturalWidth;
          state.imageH = img.naturalHeight;
          render();
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    document.querySelectorAll("input, select").forEach((el) => {
      if (el.id !== "imageFile") {
        el.addEventListener("input", render);
      }
    });

    document.getElementById("printBtn").addEventListener("click", () => {
      if (!state.imageUrl) {
        alert("Сначала загрузи изображение для печати.");
        return;
      }
      const data = compute();
      const html = buildPrintHtml(data);
      const win = window.open("", "_blank");
      if (!win) return;
      win.document.open();
      win.document.write(html);
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 300);
    });

    document.getElementById("downloadHtmlBtn").addEventListener("click", () => {
      if (!state.imageUrl) {
        alert("Сначала загрузи изображение.");
        return;
      }
      const data = compute();
      const html = buildPrintHtml(data);
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    });

    render();
  </script>
</body>
</html>
