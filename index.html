<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Квиз: умножение и деление</title>
  <style>
    :root {
      --bg-1: #f6f4ef;
      --bg-2: #e7efe9;
      --card: #fffdf8;
      --text: #1f2937;
      --muted: #5b6472;
      --line: #d4d9df;
      --accent: #0f766e;
      --accent-2: #0b5f58;
      --ok: #166534;
      --bad: #991b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, #fef3c7 0%, transparent 28%),
        radial-gradient(circle at 85% 80%, #dbeafe 0%, transparent 30%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid #e6e8eb;
      border-radius: 18px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.10);
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.1;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 16px;
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    select, input, button {
      width: 100%;
      border: 1px solid #c8d0da;
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 15px;
      font-family: inherit;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 8px 16px rgba(15, 118, 110, .22);
    }

    .primary:hover { background: var(--accent-2); }

    .ghost {
      background: #f8fafc;
      color: var(--text);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1;
      min-width: 120px;
    }

    .quiz-hidden { display: none; }

    .meta {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
    }

    .question {
      font-size: clamp(34px, 8vw, 54px);
      text-align: center;
      margin: 16px 0;
      letter-spacing: .5px;
    }

    .feedback {
      min-height: 24px;
      font-weight: 700;
      text-align: center;
      margin-top: 10px;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
    }

    .results h2 {
      margin: 0 0 10px;
    }

    .score {
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 800;
      color: var(--accent);
      margin: 0;
    }

    ul {
      margin: 10px 0 0;
      padding-left: 20px;
      color: #374151;
    }

    @media (max-width: 520px) {
      .app { padding: 14px; }
      .panel { padding: 12px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Квиз: таблица умножения и деления</h1>
    <p class="sub">Тренируйся в удобном темпе: выбери режим, диапазон и количество вопросов.</p>

    <section id="setup" class="panel">
      <div class="grid">
        <div>
          <label for="mode">Режим</label>
          <select id="mode">
            <option value="mix">Смешанный (× и ÷)</option>
            <option value="mul">Только умножение (×)</option>
            <option value="div">Только деление (÷)</option>
          </select>
        </div>
        <div>
          <label for="maxNumber">Максимальное число</label>
          <select id="maxNumber">
            <option value="5">до 5</option>
            <option value="10" selected>до 10</option>
            <option value="12">до 12</option>
            <option value="15">до 15</option>
            <option value="20">до 20</option>
          </select>
        </div>
        <div>
          <label for="questionsCount">Вопросов</label>
          <select id="questionsCount">
            <option value="10">10</option>
            <option value="15" selected>15</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select>
        </div>
      </div>
      <div style="margin-top:12px;">
        <button id="startBtn" class="primary">Начать квиз</button>
      </div>
    </section>

    <section id="quiz" class="panel quiz-hidden">
      <div class="meta">
        <div id="progress">Вопрос 1/10</div>
        <div id="timer">Время: 00:00</div>
        <div id="scoreNow">Верно: 0</div>
      </div>
      <div id="question" class="question">7 × 8 = ?</div>
      <div class="row">
        <input id="answerInput" type="number" inputmode="numeric" placeholder="Введите ответ" />
        <button id="submitBtn" class="primary">Ответить</button>
      </div>
      <p id="feedback" class="feedback"></p>
      <p class="hint">Нажми Enter, чтобы ответить быстрее.</p>
    </section>

    <section id="results" class="panel results quiz-hidden">
      <h2>Результат</h2>
      <p id="scoreFinal" class="score">0 / 0</p>
      <ul>
        <li id="accLine">Точность: 0%</li>
        <li id="timeLine">Время: 00:00</li>
        <li id="markLine">Оценка: -</li>
      </ul>
      <div style="margin-top:12px;" class="row">
        <button id="restartBtn" class="primary">Пройти еще раз</button>
        <button id="newSettingsBtn" class="ghost">Изменить настройки</button>
      </div>
    </section>
  </main>

  <script>
    const state = {
      questions: [],
      index: 0,
      correct: 0,
      startedAt: 0,
      seconds: 0,
      timerId: null,
      finished: false
    };

    const $ = (id) => document.getElementById(id);

    const setup = $('setup');
    const quiz = $('quiz');
    const results = $('results');

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatTime(totalSeconds) {
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      return `${pad(m)}:${pad(s)}`;
    }

    function grade(percent) {
      if (percent >= 90) return '5 (Отлично)';
      if (percent >= 75) return '4 (Хорошо)';
      if (percent >= 55) return '3 (Удовлетворительно)';
      return '2 (Нужно потренироваться)';
    }

    function createQuestion(mode, maxN) {
      const useMul = mode === 'mul' ? true : mode === 'div' ? false : Math.random() < 0.5;

      if (useMul) {
        const a = rand(2, maxN);
        const b = rand(2, maxN);
        return {
          text: `${a} × ${b} = ?`,
          answer: a * b
        };
      }

      const divisor = rand(2, maxN);
      const answer = rand(2, maxN);
      const dividend = divisor * answer;
      return {
        text: `${dividend} ÷ ${divisor} = ?`,
        answer
      };
    }

    function buildQuestions(mode, maxN, count) {
      const arr = [];
      for (let i = 0; i < count; i++) {
        arr.push(createQuestion(mode, maxN));
      }
      return arr;
    }

    function showQuestion() {
      const q = state.questions[state.index];
      $('question').textContent = q.text;
      $('progress').textContent = `Вопрос ${state.index + 1}/${state.questions.length}`;
      $('scoreNow').textContent = `Верно: ${state.correct}`;
      $('answerInput').value = '';
      $('answerInput').focus();
      $('feedback').textContent = '';
      $('feedback').className = 'feedback';
    }

    function tickTimer() {
      state.seconds = Math.floor((Date.now() - state.startedAt) / 1000);
      $('timer').textContent = `Время: ${formatTime(state.seconds)}`;
    }

    function startTimer() {
      stopTimer();
      state.startedAt = Date.now();
      state.seconds = 0;
      tickTimer();
      state.timerId = setInterval(tickTimer, 1000);
    }

    function stopTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function finishQuiz() {
      state.finished = true;
      stopTimer();
      quiz.classList.add('quiz-hidden');
      results.classList.remove('quiz-hidden');

      const total = state.questions.length;
      const percent = total ? Math.round((state.correct / total) * 100) : 0;

      $('scoreFinal').textContent = `${state.correct} / ${total}`;
      $('accLine').textContent = `Точность: ${percent}%`;
      $('timeLine').textContent = `Время: ${formatTime(state.seconds)}`;
      $('markLine').textContent = `Оценка: ${grade(percent)}`;
    }

    function submitAnswer() {
      if (state.finished) return;

      const raw = $('answerInput').value.trim();
      if (raw === '') {
        $('feedback').textContent = 'Введите ответ.';
        $('feedback').className = 'feedback bad';
        return;
      }

      const value = Number(raw);
      const q = state.questions[state.index];
      const ok = value === q.answer;

      if (ok) {
        state.correct += 1;
        $('feedback').textContent = 'Верно!';
        $('feedback').className = 'feedback ok';
      } else {
        $('feedback').textContent = `Неверно. Правильный ответ: ${q.answer}`;
        $('feedback').className = 'feedback bad';
      }

      $('scoreNow').textContent = `Верно: ${state.correct}`;

      setTimeout(() => {
        state.index += 1;
        if (state.index >= state.questions.length) {
          finishQuiz();
          return;
        }
        showQuestion();
      }, 700);
    }

    function startQuiz() {
      const mode = $('mode').value;
      const maxN = Number($('maxNumber').value);
      const count = Number($('questionsCount').value);

      state.questions = buildQuestions(mode, maxN, count);
      state.index = 0;
      state.correct = 0;
      state.finished = false;

      setup.classList.add('quiz-hidden');
      results.classList.add('quiz-hidden');
      quiz.classList.remove('quiz-hidden');

      startTimer();
      showQuestion();
    }

    function openSettings() {
      stopTimer();
      setup.classList.remove('quiz-hidden');
      quiz.classList.add('quiz-hidden');
      results.classList.add('quiz-hidden');
    }

    $('startBtn').addEventListener('click', startQuiz);
    $('submitBtn').addEventListener('click', submitAnswer);
    $('answerInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitAnswer();
    });
    $('restartBtn').addEventListener('click', startQuiz);
    $('newSettingsBtn').addEventListener('click', openSettings);
  </script>
</body>
</html>
