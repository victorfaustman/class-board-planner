<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Генератор оформления темы</title>
  <style>
    :root {
      --bg: #f5f6f3;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --line: #d6deea;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #dff7f2 0%, transparent 30%),
        radial-gradient(circle at 85% 80%, #ffe8ce 0%, transparent 32%),
        var(--bg);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--card);
      border: 1px solid #e5ebf3;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 8px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .muted { margin: 0; color: var(--muted); }
    .grid { display: grid; gap: 10px; }
    .fields { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    input, select {
      width: 100%; border: 1px solid #cdd7e5; border-radius: 10px; padding: 9px 10px; font-size: 14px;
    }
    .headlineBox {
      border: 1px dashed #bfd3ea;
      border-radius: 10px;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      background: linear-gradient(135deg, #f0fdfa, #e0f2fe);
      font-weight: 800;
      letter-spacing: 1px;
      color: #0f172a;
      text-transform: uppercase;
    }
    .result strong { color: var(--accent); font-size: 24px; }
    .wallWrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: #fafafa; }
    .wall {
      position: relative;
      margin: 0 auto;
      border: 2px solid #aab9ca;
      border-radius: 8px;
      background: linear-gradient(140deg, #f8fafc, #eef2f7);
      min-width: 320px;
      min-height: 180px;
    }
    .tiles {
      position: absolute;
      display: grid;
      gap: 4px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px dashed #9db4cf;
      border-radius: 8px;
      padding: 4px;
    }
    .tile {
      border: 1px solid #c2d0e0;
      border-radius: 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334155;
      background: #fff;
    }
    .titleOverlay {
      position: absolute;
      transform: translateY(-50%);
      text-align: center;
      font-weight: 800;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 1px 0 rgba(255,255,255,.85);
      pointer-events: none;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Генератор оформления темы</h1>
    <p class="muted">Введи название темы, размеры стены и тип листа. Приложение покажет, сколько листов нужно и как это будет выглядеть на стене.</p>

    <section class="card">
      <h2>1) Параметры</h2>
      <div class="grid fields">
        <div>
          <label>Название темы / праздника</label>
          <input id="theme" value="С Днем Учителя" />
        </div>
        <div>
          <label>Ширина стены (см)</label>
          <input id="wallW" type="number" value="300" min="50" />
        </div>
        <div>
          <label>Высота стены (см)</label>
          <input id="wallH" type="number" value="120" min="40" />
        </div>
        <div>
          <label>Тип листа</label>
          <select id="sheetType">
            <option value="A4">A4 (210 x 297 мм)</option>
            <option value="A3">A3 (297 x 420 мм)</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>2) Заголовок</h2>
      <div id="headlinePreview" class="headlineBox"></div>
      <p class="muted" id="headlineMeta" style="margin-top:8px;"></p>
    </section>

    <section class="card result">
      <h2>3) Расчет листов</h2>
      <p>Нужно листов: <strong id="sheetsCount">0</strong></p>
      <p class="muted" id="sheetStats"></p>
    </section>

    <section class="card">
      <h2>4) Визуализация стены</h2>
      <div class="wallWrap">
        <div id="wall" class="wall">
          <div id="tiles" class="tiles"></div>
          <div id="titleOverlay" class="titleOverlay"></div>
        </div>
      </div>
      <p class="muted" id="legend" style="margin-top:8px;"></p>
    </section>
  </div>

  <script>
    const SHEETS = {
      A4: { w: 210, h: 297 },
      A3: { w: 297, h: 420 }
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function getInputs() {
      return {
        theme: (document.getElementById('theme').value || '').trim() || 'ТЕМА',
        wallW: Math.max(50, Number(document.getElementById('wallW').value) || 300),
        wallH: Math.max(40, Number(document.getElementById('wallH').value) || 120),
        sheetType: document.getElementById('sheetType').value
      };
    }

    function estimateTitleArea(theme, wallWmm, wallHmm) {
      const letters = theme.replace(/\s+/g, '').length;
      const lineCount = theme.length > 20 ? 2 : 1;
      const targetW = clamp(letters * 55 + 220, wallWmm * 0.35, wallWmm * 0.9);
      const targetH = lineCount === 2 ? wallHmm * 0.35 : wallHmm * 0.22;
      return { targetW, targetH, lineCount, letters };
    }

    function compute() {
      const i = getInputs();
      const s = SHEETS[i.sheetType] || SHEETS.A4;

      const wallWmm = i.wallW * 10;
      const wallHmm = i.wallH * 10;

      const margin = 5;
      const overlap = 3;
      const tileW = s.w - margin * 2 - overlap;
      const tileH = s.h - margin * 2 - overlap;

      const titleArea = estimateTitleArea(i.theme, wallWmm, wallHmm);

      const cols = Math.max(1, Math.ceil(titleArea.targetW / tileW));
      const rows = Math.max(1, Math.ceil(titleArea.targetH / tileH));
      const sheets = cols * rows;

      return { ...i, wallWmm, wallHmm, tileW, tileH, cols, rows, sheets, titleArea };
    }

    function render() {
      const d = compute();

      document.getElementById('headlinePreview').textContent = d.theme;
      document.getElementById('headlineMeta').textContent = `Оценка заголовка: ${Math.round(d.titleArea.targetW)} x ${Math.round(d.titleArea.targetH)} мм.`;

      document.getElementById('sheetsCount').textContent = String(d.sheets);
      document.getElementById('sheetStats').textContent = `${d.sheetType}: полезная область листа ${d.tileW.toFixed(1)} x ${d.tileH.toFixed(1)} мм. Разбивка заголовка: ${d.cols} x ${d.rows}.`;

      const wall = document.getElementById('wall');
      const maxW = 900;
      const pxPerMm = Math.min(maxW / d.wallWmm, 520 / d.wallHmm);
      const wallPxW = Math.max(320, Math.round(d.wallWmm * pxPerMm));
      const wallPxH = Math.max(180, Math.round(d.wallHmm * pxPerMm));
      wall.style.width = wallPxW + 'px';
      wall.style.height = wallPxH + 'px';

      const tiles = document.getElementById('tiles');
      tiles.style.gridTemplateColumns = `repeat(${d.cols}, 1fr)`;
      tiles.style.gridTemplateRows = `repeat(${d.rows}, 1fr)`;
      const zoneW = Math.round((d.titleArea.targetW / d.wallWmm) * wallPxW);
      const zoneH = Math.round((d.titleArea.targetH / d.wallHmm) * wallPxH);
      const left = Math.round((wallPxW - zoneW) / 2);
      const top = Math.round(wallPxH * 0.26);
      tiles.style.left = left + 'px';
      tiles.style.top = top + 'px';
      tiles.style.width = Math.max(120, zoneW) + 'px';
      tiles.style.height = Math.max(70, zoneH) + 'px';
      tiles.innerHTML = '';
      for (let n = 1; n <= d.sheets; n++) {
        const el = document.createElement('div');
        el.className = 'tile';
        el.textContent = n;
        tiles.appendChild(el);
      }

      const overlay = document.getElementById('titleOverlay');
      overlay.textContent = d.theme;
      overlay.style.left = left + 'px';
      overlay.style.top = Math.round(top + Math.max(70, zoneH) / 2) + 'px';
      overlay.style.width = Math.max(120, zoneW) + 'px';
      overlay.style.fontSize = Math.max(16, Math.min(56, Math.max(120, zoneW) / (d.theme.length * 0.55))) + 'px';

      document.getElementById('legend').textContent = `На стене показана зона заголовка, разбитая на ${d.sheets} лист(ов) ${d.sheetType}.`;
    }

    document.querySelectorAll('input, select').forEach((el) => el.addEventListener('input', render));
    render();
  </script>
</body>
</html>
