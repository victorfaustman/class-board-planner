  <title>Bomb Defusal: Number Systems</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; }
    
    .main-wrapper {
      height: 100%;
      width: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 20px;
    }

    .bomb-container {
      perspective: 1000px;
      animation: pulse-danger 2s infinite;
    }

    @keyframes pulse-danger {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .bomb {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at 30% 30%, #ff4444, #cc0000);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.8), inset -5px -5px 15px rgba(0, 0, 0, 0.5);
    }

    .bomb::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 60px;
      background: #333;
      border-radius: 5px;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px rgba(255, 200, 0, 0.6);
    }

    .bomb::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 30px;
      background: #ffcc00;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      animation: flicker 0.1s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .timer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: bold;
      color: #ffff00;
      text-shadow: 0 0 10px #ffff00;
      animation: timer-pulse 1s infinite;
    }

    @keyframes timer-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.1); }
    }

    .control-panel {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      border: 3px solid #00ff00;
      border-radius: 10px;
      padding: 30px;
      max-width: 500px;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.4), inset 0 0 20px rgba(0, 255, 0, 0.1);
      margin-top: 40px;
    }

    .control-panel.error {
      animation: shake-panel 0.3s, error-glow 0.5s;
    }

    @keyframes shake-panel {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @keyframes error-glow {
      0%, 100% { border-color: #00ff00; box-shadow: 0 0 30px rgba(0, 255, 0, 0.4); }
      50% { border-color: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
    }

    .control-panel.success {
      animation: success-glow 0.6s;
    }

    @keyframes success-glow {
      0% { box-shadow: 0 0 30px rgba(0, 255, 0, 0.4); }
      50% { box-shadow: 0 0 50px rgba(0, 255, 0, 0.8), inset 0 0 30px rgba(0, 255, 0, 0.3); }
      100% { box-shadow: 0 0 30px rgba(0, 255, 0, 0.4); }
    }

    .task-display {
      background: #000;
      border: 2px solid #00ff00;
      padding: 20px;
      border-radius: 5px;
      margin-bottom: 20px;
      text-align: center;
    }

    .task-title {
      color: #ffff00;
      font-size: 14px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .task-number {
      color: #00ff00;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 3px;
      margin: 10px 0;
    }

    .task-instruction {
      color: #00ffff;
      font-size: 14px;
      margin-top: 15px;
    }

    .input-section {
      margin: 20px 0;
    }

    .input-label {
      color: #00ff00;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 12px;
      background: #0a0a0a;
      border: 2px solid #00ff00;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      text-transform: uppercase;
      border-radius: 5px;
      transition: all 0.3s;
    }

    .input-field:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
      border-color: #00ffff;
    }

    .input-field.error {
      border-color: #ff0000;
      background: #2a0000;
      color: #ff6666;
    }

    .hint {
      color: #ffff00;
      font-size: 12px;
      margin-top: 15px;
      padding: 10px;
      background: rgba(255, 255, 0, 0.1);
      border-left: 3px solid #ffff00;
      border-radius: 3px;
      display: none;
    }

    .hint.show {
      display: block;
      animation: slide-hint 0.3s;
    }

    @keyframes slide-hint {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #00ff00;
      background: transparent;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 5px;
      font-weight: bold;
    }

    .btn:hover {
      background: #00ff00;
      color: #000;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-submit {
      background: linear-gradient(135deg, #00ff00, #00cc00);
      color: #000;
      border-color: #00cc00;
    }

    .btn-hint {
      color: #ffff00;
      border-color: #ffff00;
    }

    .btn-hint:hover {
      background: #ffff00;
      color: #000;
    }

    .message {
      color: #00ff00;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
      animation: message-appear 0.4s;
    }

    @keyframes message-appear {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.error {
      color: #ff6666;
    }

    .message.success {
      color: #00ff00;
    }

    .progress {
      margin-top: 30px;
      text-align: center;
      color: #00ffff;
      font-size: 12px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #0a0a0a;
      border: 1px solid #00ff00;
      border-radius: 5px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #00ffff);
      width: 0%;
      transition: width 0.4s;
    }

    .status-display {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
      font-size: 12px;
    }

    .status-item {
      background: #0a0a0a;
      border: 1px solid #00ff00;
      padding: 8px;
      border-radius: 3px;
      color: #00ffff;
    }

    .status-value {
      color: #ffff00;
      font-weight: bold;
    }

    .game-over {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fade-in 0.5s;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .game-over-content {
      text-align: center;
      padding: 40px;
      border: 3px solid #00ff00;
      border-radius: 10px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      box-shadow: 0 0 50px rgba(0, 255, 0, 0.5);
    }

    .game-over-title {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #00ff00;
    }

    .game-over-text {
      font-size: 24px;
      color: #00ffff;
      margin-bottom: 30px;
    }

    .game-over-stats {
      color: #ffff00;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .btn-restart {
      padding: 15px 40px;
      font-size: 18px;
      background: linear-gradient(135deg, #00ff00, #00cc00);
      color: #000;
      border: 2px solid #00cc00;
    }

    .defuse-animation {
      animation: defuse-burst 0.8s;
    }

    @keyframes defuse-burst {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(0.8);
        opacity: 0.3;
      }
    }

 <body>
  <script src="/_sdk/element_sdk.js"></script>
  <div class="main-wrapper">
   <h1 style="color: #ff4444; font-size: 32px; margin-bottom: 20px; text-shadow: 0 0 10px #ff4444;">⚠️ СИСТЕМА ОБЕЗВРЕЖИВАНИЯ БОМБ ⚠️</h1>
   <div class="bomb-container">
    <div class="bomb" id="bombElement">
     <div class="timer" id="timerDisplay">
      5:00
     </div>
    </div>
   </div>
   <div class="control-panel" id="controlPanel">
    <div class="task-display">
     <div class="task-title">
      ЗАДАЧА
     </div>
     <div class="task-number" id="taskNumber">
      --
     </div>
     <div class="task-instruction" id="taskInstruction">
      Ожидание инициализации...
     </div>
    </div>
    <div class="input-section"><label class="input-label" for="answerInput">ВВЕДИТЕ КОД:</label> <input type="text" id="answerInput" class="input-field" placeholder="Ваш ответ..." autocomplete="off">
     <div class="hint" id="hint"></div>
    </div>
    <div class="message" id="message"></div>
    <div class="button-group"><button class="btn btn-submit" id="submitBtn">✓ ПРИНЯТЬ</button> <button class="btn btn-hint" id="hintBtn">? ПОДСКАЗКА</button>
    </div>
    <div class="status-display">
     <div class="status-item">
      Задач решено: <span class="status-value" id="solvedCount">0</span>/6
     </div>
     <div class="status-item">
      Статус: <span class="status-value" id="status">АКТИВНА</span>
     </div>
    </div>
    <div class="progress">
     <div>
      Прогресс обезвреживания
     </div>
     <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
     </div>
    </div>
   </div>
  </div>
  <div class="game-over" id="gameOverScreen" style="display: none;">
   <div class="game-over-content">
    <div class="game-over-title" id="gameOverTitle">
     УСПЕШНО!
    </div>
    <div class="game-over-text" id="gameOverText">
     Система обезврежена
    </div>
    <div class="game-over-stats">
     <div>
      Все коды введены правильно
     </div>
     <div style="margin-top: 10px;">
      Бомба разобрана в безопасности ✓
     </div>
    </div><button class="btn btn-restart" id="restartBtn">НОВАЯ ПОПЫТКА</button>
   </div>

  <script>
    // Web Audio API для звуков
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(frequency, duration, type = 'sine') {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      osc.connect(gain);
      gain.connect(audioContext.destination);
      
      osc.frequency.value = frequency;
      osc.type = type;
      
      gain.gain.setValueAtTime(0.3, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
      
      osc.start(audioContext.currentTime);
      osc.stop(audioContext.currentTime + duration);
    }

    function playSuccessSound() {
      playSound(800, 0.1);
      setTimeout(() => playSound(1000, 0.15), 100);
    }

    function playErrorSound() {
      playSound(300, 0.2);
      setTimeout(() => playSound(200, 0.3), 150);
    }

    // Данные задач по всем системам счисления
    const tasks = [
      {
        number: '101101',
        from: 'двоичная (2)',
        to: 'десятичная (10)',
        answer: '45',
        hint: '1×2⁵ + 0×2⁴ + 1×2³ + 1×2² + 0×2¹ + 1×2⁰'
      },
      {
        number: '255',
        from: 'десятичная (10)',
        to: 'шестнадцатеричная (16)',
        answer: 'FF',
        hint: '255 = 15×16 + 15. В HEX: F=15'
      },
      {
        number: '377',
        from: 'восьмеричная (8)',
        to: 'десятичная (10)',
        answer: '255',
        hint: '3×8² + 7×8¹ + 7×8⁰ = 192 + 56 + 7'
      },
      {
        number: '10110110',
        from: 'двоичная (2)',
        to: 'восьмеричная (8)',
        answer: '266',
        hint: 'Группируй по 3: 010 110 110 = 2 6 6'
      },
      {
        number: '1AF',
        from: 'шестнадцатеричная (16)',
        to: 'двоичная (2)',
        answer: '110101111',
        hint: '1=0001, A=1010, F=1111 → 000110101111'
      },
      {
        number: '64',
        from: 'десятичная (10)',
        to: 'двоичная (2)',
        answer: '1000000',
        hint: '64 = 2⁶, значит одна единица на 7 позиции'
      }
    ];

    let currentTaskIndex = 0;
    let solvedCount = 0;
    let gameActive = true;
    let timerInterval;
    let timeRemaining = 300; // 5 минут

    const elements = {
      taskNumber: document.getElementById('taskNumber'),
      taskInstruction: document.getElementById('taskInstruction'),
      answerInput: document.getElementById('answerInput'),
      submitBtn: document.getElementById('submitBtn'),
      hintBtn: document.getElementById('hintBtn'),
      message: document.getElementById('message'),
      hint: document.getElementById('hint'),
      controlPanel: document.getElementById('controlPanel'),
      timerDisplay: document.getElementById('timerDisplay'),
      solvedCount: document.getElementById('solvedCount'),
      status: document.getElementById('status'),
      progressFill: document.getElementById('progressFill'),
      gameOverScreen: document.getElementById('gameOverScreen'),
      gameOverTitle: document.getElementById('gameOverTitle'),
      gameOverText: document.getElementById('gameOverText'),
      restartBtn: document.getElementById('restartBtn'),
      bombElement: document.getElementById('bombElement')
    };

    function startTimer() {
      timerInterval = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();
        
        if (timeRemaining <= 0) {
          endGame(false);
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const minutes = Math.floor(timeRemaining / 60);
      const seconds = timeRemaining % 60;
      elements.timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      
      if (timeRemaining <= 30) {
        elements.timerDisplay.style.color = '#ff4444';
        elements.timerDisplay.style.textShadow = '0 0 10px #ff4444';
      }
    }

    function loadTask() {
      if (currentTaskIndex >= tasks.length) {
        endGame(true);
        return;
      }

      const task = tasks[currentTaskIndex];
      elements.taskNumber.textContent = task.number;
      elements.taskInstruction.textContent = `Переведите из ${task.from} в ${task.to}`;
      elements.answerInput.value = '';
      elements.answerInput.classList.remove('error');
      elements.message.textContent = '';
      elements.hint.classList.remove('show');
      elements.hint.textContent = '';
      elements.answerInput.focus();
    }

    function checkAnswer() {
      if (!gameActive) return;

      const task = tasks[currentTaskIndex];
      const userAnswer = elements.answerInput.value.trim().toUpperCase();
      const correctAnswer = task.answer.toUpperCase();

      if (userAnswer === correctAnswer) {
        playSuccessSound();
        elements.answerInput.classList.remove('error');
        elements.controlPanel.classList.add('success');
        elements.message.classList.remove('error');
        elements.message.classList.add('success');
        elements.message.textContent = '✓ КОД ПРИНЯТ! МОДУЛЬ ОБЕЗВРЕЖЕН';
        elements.hint.classList.remove('show');
        elements.status.textContent = 'РАЗБИРАЕТСЯ';
        elements.status.style.color = '#00ff00';

        solvedCount++;
        updateProgress();
        elements.solvedCount.textContent = solvedCount;

        setTimeout(() => {
          elements.controlPanel.classList.remove('success');
          currentTaskIndex++;
          loadTask();
        }, 1500);
      } else {
        playErrorSound();
        elements.answerInput.classList.add('error');
        elements.controlPanel.classList.add('error');
        elements.message.classList.add('error');
        elements.message.classList.remove('success');
        elements.message.textContent = '✗ КОД НЕВЕРНЫЙ! ПОПРОБУЙТЕ ЕЩЕ';
        elements.status.textContent = 'ОШИБКА';
        elements.status.style.color = '#ff6666';

        setTimeout(() => {
          elements.controlPanel.classList.remove('error');
          elements.status.textContent = 'АКТИВНА';
          elements.status.style.color = '#ffff00';
        }, 1000);
      }
    }

    function showHint() {
      const task = tasks[currentTaskIndex];
      elements.hint.textContent = '💡 ' + task.hint;
      elements.hint.classList.add('show');
    }

    function updateProgress() {
      const percentage = (solvedCount / tasks.length) * 100;
      elements.progressFill.style.width = percentage + '%';
    }

    function endGame(won) {
      gameActive = false;
      clearInterval(timerInterval);
      
      if (won) {
        elements.gameOverTitle.textContent = '✓ УСПЕШНО!';
        elements.gameOverText.textContent = 'Система полностью обезврежена!';
        elements.bombElement.style.animation = 'none';
        playSuccessSound();
        setTimeout(() => playSuccessSound(), 200);
      } else {
        elements.gameOverTitle.textContent = '✗ НЕУДАЧА!';
        elements.gameOverTitle.style.color = '#ff4444';
        elements.gameOverText.textContent = 'Время истекло. Бомба активирована.';
        playErrorSound();
      }

      elements.gameOverScreen.style.display = 'flex';
    }

    function restart() {
      currentTaskIndex = 0;
      solvedCount = 0;
      gameActive = true;
      timeRemaining = 300;

      elements.gameOverScreen.style.display = 'none';
      elements.gameOverTitle.style.color = '#00ff00';
      elements.timerDisplay.style.color = '#ffff00';
      elements.timerDisplay.style.textShadow = '0 0 10px #ffff00';
      elements.solvedCount.textContent = '0';
      elements.status.textContent = 'АКТИВНА';
      elements.status.style.color = '#ffff00';
      elements.progressFill.style.width = '0%';
      elements.message.textContent = '';
      elements.bombElement.style.animation = 'pulse-danger 2s infinite';

      loadTask();
      startTimer();
    }

    // Event listeners
    elements.submitBtn.addEventListener('click', checkAnswer);
    elements.hintBtn.addEventListener('click', showHint);
    elements.restartBtn.addEventListener('click', restart);
    elements.answerInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkAnswer();
    });

    // Initialize
    loadTask();
    startTimer();
    lucide.createIcons();
  </script>
